vault_path: ~/memex
port: 5555

node_classification:
  default_node_type: note
  node_types:
    index:
      display_name: "Index"
      color: "#FF6B6B"
      size_multiplier: 2.0
    hub:
      display_name: "Hub"
      color: "#4ECDC4"
      size_multiplier: 1.5
    concept:
      display_name: "Concept"
      color: "#45B7D1"
      size_multiplier: 1.2
    project:
      display_name: "Project"
      color: "#96CEB4"
      size_multiplier: 1.3
    note:
      display_name: "Note"
      color: "#3a7bd5"
      size_multiplier: 1.0
  classification_rules:
    - name: index_tag
      priority: 1
      type: tag
      pattern: index
      node_type: index
    - name: hub_prefix
      priority: 2
      type: filename_prefix
      pattern: "~"
      node_type: hub
